name: Sync Recruiting Emails
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install google-auth google-auth-oauthlib google-api-python-client
      - name: Run sync script
        env:
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python recruiting_sync.py
      - name: Commit and push data.json
        run: |
          git config user.name "Recruiting Bot"
          git config user.email "bot@recruiting-hub"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-sync recruiting emails"
          git push
