name: Sync Recruiting Emails

on:
  schedule:
    - cron: '0 8 * * *'  # Runs every day at 8:00 AM UTC (3 AM Eastern, 2 AM Central)
  workflow_dispatch:       # Also lets you run it manually with a button on GitHub

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install google-auth google-auth-oauthlib google-api-python-client anthropic

      - name: Run sync script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN }}
        run: python recruiting_sync.py

      - name: Commit and push data.json
        run: |
          git config user.name "Recruiting Bot"
          git config user.email "bot@recruiting-hub"
          git add data.json
          git diff --staged --quiet || git commit -m "Auto-sync recruiting emails"
          git push
